<form method="post" enctype="multipart/form-data" data-doc-upload-form class="space-y-6">
  {% csrf_token %}
  <input type="hidden" name="action" value="upload">
  <input type="hidden" name="project_sn" value="{% if current_project %}{{ current_project.sn }}{% endif %}">

  <section class="space-y-3">
    <div>
      <h4 class="text-sm font-semibold text-slate-900">RFP(제안요청서) 업로드</h4>
      <p class="mt-1 text-xs text-slate-500">허용 파일 형식: .docx, .pdf / 파일당 최대 {{ max_file_size_mb }}MB / 한 번에 최대 {{ max_upload_files }}개</p>
    </div>
    <div data-doc-drop-zone="rfp" class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 px-6 py-8 text-center">
      <p class="text-sm text-slate-700">파일을 끌어다 놓거나 파일 선택 버튼으로 직접 선택하세요.</p>
      <button type="button" data-doc-upload-select="rfp" class="mt-4 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">
        파일 선택
      </button>
      <input type="file" name="rfp_files" data-doc-file-input="rfp" accept=".docx,.pdf" multiple class="hidden">
    </div>
    <div data-doc-file-list="rfp" class="space-y-2"></div>
  </section>

  <section class="space-y-3">
    <div>
      <h4 class="text-sm font-semibold text-slate-900">회의록 업로드</h4>
      <p class="mt-1 text-xs text-slate-500">허용 파일 형식: .docx, .pdf / 파일당 최대 {{ max_file_size_mb }}MB / 한 번에 최대 {{ max_upload_files }}개</p>
    </div>
    <div data-doc-drop-zone="meeting" class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 px-6 py-8 text-center">
      <p class="text-sm text-slate-700">파일을 끌어다 놓거나 파일 선택 버튼으로 직접 선택하세요.</p>
      <button type="button" data-doc-upload-select="meeting" class="mt-4 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">
        파일 선택
      </button>
      <input type="file" name="meeting_files" data-doc-file-input="meeting" accept=".docx,.pdf" multiple class="hidden">
    </div>
    <div data-doc-file-list="meeting" class="space-y-2"></div>
  </section>

  <div class="flex justify-end">
    <button type="submit" class="rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700">
      추가
    </button>
  </div>
</form>
