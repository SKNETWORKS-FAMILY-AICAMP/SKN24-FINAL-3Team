<aside data-sidebar-panel class="border-b border-slate-200 bg-white lg:fixed lg:inset-y-0 lg:left-0 lg:z-40 lg:w-64 lg:border-b-0 lg:border-r">
  <div class="flex h-full flex-col">
    <div class="flex h-16 items-center gap-3 border-b border-slate-200 px-4">
      <div class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-300 bg-slate-50 text-sm font-bold text-slate-700">
        A
      </div>
      <div>
        <p class="text-xs font-medium uppercase tracking-[0.2em] text-slate-400">ALPLED</p>
        <p class="text-sm font-semibold text-slate-900">Admin Console</p>
      </div>
    </div>

    <div class="border-b border-slate-200 px-3 py-4">
      <div class="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3">
        <p class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-400">Current Project</p>
        <form method="post" action="{% url 'set_current_project' %}" data-current-project-form class="mt-2">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.get_full_path }}">
          <select
            name="project_sn"
            data-current-project-select
            class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-semibold text-slate-900 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-400"
            {% if not available_projects %}disabled{% endif %}
          >
            {% if available_projects %}
              {% for project in available_projects %}
                <option value="{{ project.sn }}" {% if current_project and current_project.sn == project.sn %}selected{% endif %}>
                  {{ project.name }}
                </option>
              {% endfor %}
            {% else %}
              <option value="">선택 가능한 프로젝트가 없습니다</option>
            {% endif %}
          </select>
        </form>
      </div>
    </div>

    <nav class="flex-1 space-y-2 px-3 py-4">
      <a href="{% url 'user_list' %}" class="flex items-center gap-3 rounded-xl border px-4 py-3 text-sm font-medium transition {% if active_menu == 'users' %}border-blue-200 bg-blue-50 text-blue-700{% else %}border-slate-200 bg-white text-slate-700 hover:bg-slate-50{% endif %}">
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 10.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/>
          <path d="M4 16.5c0-2.8 2.7-4.5 6-4.5s6 1.7 6 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span>사용자 관리</span>
      </a>

      <a href="{% url 'project_list' %}" class="flex items-center gap-3 rounded-xl border px-4 py-3 text-sm font-medium transition {% if active_menu == 'projects' %}border-blue-200 bg-blue-50 text-blue-700{% else %}border-slate-200 bg-white text-slate-700 hover:bg-slate-50{% endif %}">
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3.5 6.5a2 2 0 0 1 2-2h2l1.8 1.8h7.2a2 2 0 0 1 2 2v6.2a2 2 0 0 1-2 2h-11a2 2 0 0 1-2-2v-8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
        <span>프로젝트 관리</span>
      </a>

      <a href="{% url 'doc_list' %}" class="flex items-center gap-3 rounded-xl border px-4 py-3 text-sm font-medium transition {% if active_menu == 'docs' %}border-blue-200 bg-blue-50 text-blue-700{% else %}border-slate-200 bg-white text-slate-700 hover:bg-slate-50{% endif %}">
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M5 3.8h6.8L15 7v9.2A1.8 1.8 0 0 1 13.2 18H5.8A1.8 1.8 0 0 1 4 16.2V5.6A1.8 1.8 0 0 1 5.8 3.8H5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M11.8 3.8V7H15" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
        <span>문서 관리</span>
      </a>
    </nav>

    <div class="border-t border-slate-200 p-4">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-900">{% firstof request.user.username "admin" %}</span>
        <button type="button" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">
          Logout
        </button>
      </div>
    </div>
  </div>
</aside>
